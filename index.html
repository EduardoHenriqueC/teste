<script>
// Roteamento SPA Interno
function routeTo(pageId) {
    renderPage(pageId);
}

function renderPage(pageId) {
    const template = document.getElementById('tpl-' + pageId);
    const contentArea = document.getElementById('app-content');
    
    if (template && contentArea) {
        contentArea.style.opacity = '0';
        contentArea.style.transition = 'opacity 0.3s ease';
        
        // Clona o conteúdo do template e injeta no main
        contentArea.innerHTML = template.innerHTML;
        
        // Todas as imagens do conteúdo recebem lazy loading e fallback
        contentArea.querySelectorAll('img').forEach(img => {
            img.loading = 'lazy';
            img.onerror = function() { this.style.display = 'none'; };
        });
        
        // Se estiver no mobile e clicou em um link, fecha a sidebar
        if (window.innerWidth <= 1024) {
            closeMobileSidebar();
        }
        
        // Rola para o topo
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        // Re-inicializa os hover effects dos cards se houver script necessário
        initCardEffects();
        initPageInteractions();
        if (pageId === 'noticias') {
            fetchNewsFeed();
        }
        
        updateActiveNav(pageId);
        setTimeout(() => contentArea.style.opacity = '1', 50);
    } else {
        console.error('Template não encontrado para:', pageId);
        // Fallback para home
        if(pageId !== 'home') renderPage('home');
    }
}

function updateActiveNav(pageId) {
    // Remove classe ativa de todos
    document.querySelectorAll('aside nav a').forEach(el => {
        el.classList.remove('border-l-[3px]', 'border-primary-container', 'bg-surface-container-highest', 'text-on-surface');
        el.classList.add('text-on-surface-variant');
    });
    
    // Adiciona na página atual (se existir no menu principal)
    let activeMap = {
        'home': 'Início',
        'ao-vivo': 'Ao Vivo',
        'noticias': 'Notícias',
        'programacao': 'Programação',
        'favoritos': 'Favoritos'
    };
    
    let targetText = activeMap[pageId];
    if(targetText) {
        document.querySelectorAll('aside nav a').forEach(el => {
            if(el.textContent.includes(targetText)) {
                el.classList.add('border-l-[3px]', 'border-primary-container', 'bg-surface-container-highest', 'text-on-surface');
                el.classList.remove('text-on-surface-variant');
            }
        });
    }
}

// Micro-interações re-inicializadas a cada renderização
function initCardEffects() {
    const cards = document.querySelectorAll('.bg-surface-container');
    cards.forEach(card => {
        card.addEventListener('mouseenter', () => {
            card.style.transform = 'translateY(-4px)';
            card.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
        });
        card.addEventListener('mouseleave', () => {
            card.style.transform = 'translateY(0)';
        });
    });
}

function initPageInteractions() {
    const chatInput = document.querySelector('#app-content input[placeholder="Envie sua reação..."]');
    const chatButton = document.querySelector('#app-content button[data-icon="send"], #app-content button span[data-icon="send"]');
    if (chatInput) {
        chatInput.addEventListener('keydown', event => {
            if (event.key === 'Enter' && chatInput.value.trim()) {
                event.preventDefault();
                addChatMessage(chatInput.value.trim());
                chatInput.value = '';
            }
        });
    }
    if (chatButton && chatInput) {
        const button = chatButton.closest('button') || chatButton;
        button.addEventListener('click', () => {
            if (chatInput.value.trim()) {
                addChatMessage(chatInput.value.trim());
                chatInput.value = '';
            }
        });
    }
    const refreshButton = document.getElementById('refresh-news-btn');
    if (refreshButton) {
        refreshButton.addEventListener('click', () => {
            fetchNewsFeed();
        });
    }
}

const NEWS_FEEDS = [
    'https://rss.cnn.com/rss/edition_sport.rss',
    'https://feeds.bbci.co.uk/sport/rss.xml',
    'https://www.espn.com/espn/rss/news'
];
const NEWS_PROXY = 'https://api.allorigins.win/get?url=';

async function fetchNewsFeed() {
    const container = document.getElementById('news-grid');
    const loading = document.getElementById('news-loading');
    if (!container || !loading) return;
    loading.style.display = 'block';
    loading.textContent = 'Buscando as últimas notícias esportivas...';
    container.innerHTML = '';

    try {
        const feedUrl = NEWS_FEEDS[Math.floor(Math.random() * NEWS_FEEDS.length)];
        const response = await fetch(NEWS_PROXY + encodeURIComponent(feedUrl));
        if (!response.ok) throw new Error('Falha ao buscar feed');

        let rssText = '';
        const contentType = response.headers.get('content-type') || '';
        if (contentType.includes('application/json')) {
            const payload = await response.json();
            rssText = payload?.contents || '';
        } else {
            rssText = await response.text();
        }

        if (!rssText) throw new Error('Feed vazio');

        const parser = new DOMParser();
        const xml = parser.parseFromString(rssText, 'application/xml');
        const items = Array.from(xml.querySelectorAll('item')).slice(0, 8);
        if (items.length === 0) throw new Error('Nenhuma notícia encontrada');
        renderNewsItems(items);
        loading.style.display = 'none';
    } catch (error) {
        console.error('Erro ao carregar notícias:', error);
        loading.textContent = 'Não foi possível carregar notícias. Clique em atualizar ou tente novamente mais tarde.';
        container.innerHTML = `<div class="bg-surface-container p-6 rounded-2xl border border-red-600 text-red-200">${error.message}</div>`;
    }
}

function renderNewsItems(items) {
    const container = document.getElementById('news-grid');
    if (!container) return;
    container.innerHTML = items.map(item => {
        const title = item.querySelector('title')?.textContent || 'Notícia sem título';
        const link = item.querySelector('link')?.textContent || '#';
        const description = item.querySelector('description')?.textContent || item.querySelector('summary')?.textContent || 'Resumo não disponível.';
        const pubDate = item.querySelector('pubDate')?.textContent || '';
        const image = getNewsImageFromItem(item);
        const cleanDescription = description.replace(/<[^>]+>/g, '').slice(0, 140) + '...';
        return `
            <article class="bg-surface-container rounded-3xl overflow-hidden border border-outline-variant shadow-sm hover:shadow-lg transition-all duration-300">
                <a href="${link}" target="_blank" rel="noopener noreferrer" class="block">
                    <div class="relative h-64 overflow-hidden bg-[#111111]">
                        <img src="${image}" alt="Imagem da notícia" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&w=900&q=80'" />
                        <span class="absolute bottom-3 left-3 bg-black/70 text-[10px] uppercase tracking-[0.2em] text-white px-3 py-1 rounded">${pubDate ? new Date(pubDate).toLocaleDateString('pt-BR') : 'Atual'}</span>
                    </div>
                    <div class="p-6">
                        <h3 class="text-on-surface font-bold text-xl mb-3 line-clamp-2">${title}</h3>
                        <p class="text-on-surface-variant text-sm leading-relaxed mb-4">${cleanDescription}</p>
                        <span class="inline-flex items-center gap-2 text-primary-container font-bold uppercase text-[11px]">Leia mais <span class="material-symbols-outlined text-[16px]">arrow_forward</span></span>
                    </div>
                </a>
            </article>
        `;
    }).join('');
}

function getNewsImageFromItem(item) {
    const enclosure = item.querySelector('enclosure[url]');
    const media = item.querySelector('media\:content, content');
    const imageUrl = enclosure?.getAttribute('url') || media?.getAttribute('url') || media?.getAttribute('href');
    if (imageUrl && imageUrl.startsWith('http')) return imageUrl;
    return 'https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&w=900&q=80';
}

function addChatMessage(message) {
    const container = document.getElementById('chat-container');
    if (!container) return;
    const now = new Date();
    const time = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    const messageEl = document.createElement('div');
    messageEl.className = 'flex gap-3';
    messageEl.innerHTML = `
        <div class="w-8 h-8 rounded-full bg-primary-container/20 flex-shrink-0 flex items-center justify-center">
            <span class="text-[10px] font-bold text-primary-container">VO</span>
        </div>
        <div class="bg-[#1a1a1a] p-3 rounded-lg rounded-tl-none border border-[#222222]">
            <p class="text-[10px] font-bold text-primary-container mb-1">Você <span class="text-on-surface-variant font-normal ml-2">${time}</span></p>
            <p class="text-xs leading-relaxed">${message}</p>
        </div>
    `;
    container.appendChild(messageEl);
    container.scrollTop = container.scrollHeight;
}

    if (modal) modal.classList.remove('hidden');
}

function closeMultiview() {

}

function closeOddsModal() {
    const modal = document.getElementById('odds-modal');

}

function openShareModal() {

}

    if (panel) panel.classList.toggle('hidden');
}

function toggleTorcidaControl(control) {
    console.log('Toggle torcida control:', control);
}

function switchTab(button, tabId) {
    const allButtons = document.querySelectorAll('.tab-button');
    const allTabs = document.querySelectorAll('#tab-dados, #tab-preferencias, #tab-assinatura');
    allButtons.forEach(btn => {
        btn.classList.remove('border-primary-container', 'text-on-surface');
        btn.classList.add('text-on-surface-variant');
    });
    allTabs.forEach(tab => tab.classList.add('hidden'));
    if (button) {
        button.classList.add('border-primary-container', 'text-on-surface');
        button.classList.remove('text-on-surface-variant');
    }
    const selectedTab = document.getElementById(`tab-${tabId}`);
    if (selectedTab) selectedTab.classList.remove('hidden');
}

function toggleProfileEdit(button) {
    const inputs = document.querySelectorAll('#tab-dados input');
    const isReadonly = inputs[0] && inputs[0].hasAttribute('readonly');
    inputs.forEach(input => {
        if (isReadonly) {
            input.removeAttribute('readonly');
            input.classList.add('bg-surface-container-highest');
        } else {
            input.setAttribute('readonly', 'readonly');
        }
    });
    button.textContent = isReadonly ? 'Salvar alterações' : 'Editar dados';
}

// Lógica da Sidebar
const sidebar = document.getElementById('sidebar');
const toggleBtn = document.getElementById('sidebar-toggle');
const mobileMenuBtn = document.getElementById('mobile-menu-btn');
const mobileOverlay = document.getElementById('mobile-overlay');

// Toggle para Desktop (Colapsar)
const mainContainer = document.getElementById('main-container');

function setSidebarCollapsed(collapsed) {
    if (collapsed) {
        sidebar.classList.add('sidebar-collapsed');
        if (mainContainer && window.innerWidth > 1024) {
            mainContainer.style.marginLeft = '80px';
        }
    } else {
        sidebar.classList.remove('sidebar-collapsed');
        if (mainContainer && window.innerWidth > 1024) {
            mainContainer.style.marginLeft = '260px';
        }
    }
    const icon = toggleBtn ? toggleBtn.querySelector('span') : null;
    if (icon) icon.textContent = collapsed ? 'chevron_right' : 'chevron_left';
}

if(toggleBtn) {
    toggleBtn.addEventListener('click', () => {
        const isCollapsed = sidebar.classList.contains('sidebar-collapsed');
        setSidebarCollapsed(!isCollapsed);
    });
}

// Abrir no Mobile
if(mobileMenuBtn) {
    mobileMenuBtn.addEventListener('click', () => {
        sidebar.classList.add('sidebar-mobile-open');
        if(mobileOverlay) mobileOverlay.classList.add('active');
    });
}

function closeMobileSidebar() {
    if(sidebar) sidebar.classList.remove('sidebar-mobile-open');
    if(mobileOverlay) mobileOverlay.classList.remove('active');
}

// Fechar no Mobile ao clicar fora
if(mobileOverlay) {
    mobileOverlay.addEventListener('click', closeMobileSidebar);
}

// Inicialização
document.addEventListener('DOMContentLoaded', () => {
    // Inicializa na tela inicial
    renderPage('home');
});
</script>
